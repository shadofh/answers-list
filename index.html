   <style>
    /* 1. السطر السحري لضمان عدم خروج العناصر والحواشي عن أبعاد شاشة الجوال */
    *, *::before, *::after {
        box-sizing: border-box;
    }

    /* تصميم عصري ومريح للعين في الإضاءة المختلفة */
    body { 
        font-family: system-ui, -apple-system, sans-serif; 
        background: #12181f; 
        color: #e2e8f0; 
        padding: 15px; 
        margin: 0; 
        direction: rtl; /* لضمان قراءة العناصر من اليمين لليسار بشكل صحيح */
        -webkit-tap-highlight-color: transparent; 
    }
    
    h2 { 
        text-align: center; 
        color: #f1c40f; 
        margin: 10px 0 20px 0; 
        font-size: 1.4rem;
        border-bottom: 2px solid #2c3e50; 
        padding-bottom: 12px; 
    }

    /* حاوية مرنة تتناسب مع مقاس أي شاشة جوال */
    .list-container { 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
        width: 100%; /* تضمن أن تملأ الحاوية عرض الجوال بالكامل */
        max-width: 600px; /* تعطي مظهراً متناسقاً لو فُتحت من تابلت أو شاشة أعرض قليلًا */
        margin: 0 auto; 
    }

    /* صف الاسم: تم جعل الارتفاع مناسباً للمس باليد بسهولة */
    .name-row { 
        display: flex; 
        align-items: center; 
        background: #1e293b; 
        padding: 16px 14px; 
        border-radius: 12px; 
        box-shadow: 0 3px 6px rgba(0,0,0,0.2); 
        transition: all 0.2s ease; 
        border: 1px solid #2d3748;
        cursor: pointer;
        width: 100%; /* تجعل كل صف يمتد بكامل عرض الحاوية */
    }

    /* عند التشطيب: تخفيف البريق وعمل خط على الاسم */
    .name-row.checked { 
        background: #1a222f; 
        border-color: #232d3f;
        opacity: 0.3; 
    }
    .name-row.checked .name-text { 
        text-decoration: line-through; 
        color: #94a3b8; 
    }
    .name-row.checked .num {
        color: #64748b;
    }

    /* الترقيم */
    .num { 
        font-weight: bold; 
        color: #ef4444; 
        font-size: 1rem; 
        background: #141b24;
        padding: 4px 10px;
        border-radius: 20px;
        margin-left: 12px; 
    }

    /* الاسم */
    .name-text { 
        font-size: 1.2rem; 
        font-weight: 600; 
        color: #ffffff;
        margin-right: 12px; 
    }

    /* تخصيص الـ Checkbox */
    .checkbox-container {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    input[type="checkbox"] { 
        width: 26px; 
        height: 26px; 
        cursor: pointer; 
        accent-color: #10b981; 
        margin: 0;
    }
</style>

        function seededRandom(seed) {
            let x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function loadCurrentOrder() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionSeed = parseInt(urlParams.get('session'));

            if (!sessionSeed) {
                document.getElementById('leaderboardList').innerHTML = "<div style='text-align:center; padding:20px;'>عذراً، الرابط لا يحتوي على رمز الجلسة!</div>";
                return;
            }

            let currentSeed = sessionSeed;
            if(characters.length > 0) {
                characters.sort(() => seededRandom(currentSeed++) - 0.5);
            }

            let rowsHtml = '';
            characters.forEach((img, idx) => {
                const cleanName = img.split('.')[0].replace(/[_-]/g, ' ');
                // هنا الترتيب الجديد للهيكل: الـ Checkbox أولاً، ثم النص، ثم رقم الترتيب في اليسار
               rowsHtml += `
<div class="name-row" id="row-${idx}" onclick="toggleRowViaClick(${idx})">
    <div class="num">${idx + 1}</div>
    
    <div class="checkbox-container">
        <input type="checkbox" id="check-${idx}" onchange="toggleCheck(${idx}, this.checked)" onclick="event.stopPropagation();">
    </div>
    
    <div class="name-text">${cleanName}</div>
</div>`;
            });
            
            document.getElementById('leaderboardList').innerHTML = rowsHtml;
        }

        function toggleCheck(idx, isChecked) {
            const row = document.getElementById('row-' + idx);
            const checkbox = document.getElementById('check-' + idx);
            checkbox.checked = isChecked;
            
            if(isChecked) row.classList.add('checked');
            else row.classList.remove('checked');
        }

        // ميزة مريحة للجوال: الضغط في أي مكان على الصف يشطب الاسم مباشرة دون الحاجة لضغط المربع بدقة
        function toggleRowViaClick(idx) {
            const checkbox = document.getElementById('check-' + idx);
            toggleCheck(idx, !checkbox.checked);
        }
